name: kalendazyk
description: Tracker cyklu menstruacyjnego — proste śledzenie dat startu i prognoza kolejnego cyklu.
publish_to: 'none'
version: 1.1.3+5

environment:
  sdk: ^3.11.5
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  file_picker: ^8.0.0
  share_plus: ^9.0.0
  intl: ^0.20.2
  table_calendar: ^3.1.2
  supabase_flutter: ^2.9.0
  flutter_secure_storage: ^9.2.2
  url_launcher: ^6.3.0
  shared_preferences: ^2.3.2
  package_info_plus: ^8.0.2
  http: ^1.2.2
  open_filex: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  image_path: "assets/icon/calendar_icon.png"
  android: true
  ios: false
  windows:
    generate: true
    image_path: "assets/icon/calendar_icon.png"
    icon_size: 256
