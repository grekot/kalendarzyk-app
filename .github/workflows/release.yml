name: Build and Release APK

# Uruchamia się gdy zrobisz `git push origin vX.Y.Z` (tag zaczynający się od `v`).
# Można też ręcznie przez „Run workflow" w GitHub Actions UI.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag do release (np. v1.2.0). Musi być wcześniej utworzony.'
        required: true
        default: 'v0.0.0-test'

permissions:
  contents: write  # potrzebne do tworzenia GitHub Release

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Restore release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "ERROR: secret RELEASE_KEYSTORE_BASE64 jest pusty"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/android/release.keystore"
          ls -la "$GITHUB_WORKSPACE/android/release.keystore"

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (split per ABI)
        env:
          RELEASE_KEYSTORE_PATH: ${{ github.workspace }}/android/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: flutter build apk --release --split-per-abi

      - name: List APK files
        run: ls -la build/app/outputs/flutter-apk/

      - name: Extract version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected pubspec version: $VERSION"

      - name: Extract changelog notes
        id: changelog
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          if [ "$TAG_NAME" = "$GITHUB_REF" ]; then
            TAG_NAME="${{ inputs.tag }}"
          fi
          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"
          # Wyciąga sekcję z CHANGELOG.md dla danego tagu, np. ## [1.2.0+3]
          VERSION_NUM="${TAG_NAME#v}"
          NOTES=$(awk -v ver="$VERSION_NUM" '
            /^## \['ver'/ { found=1; next }
            /^## \[/ && found { exit }
            found
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Brak notatek w CHANGELOG.md dla wersji $VERSION_NUM."
          fi
          # Zapisz do pliku — multiline output
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.changelog.outputs.tag }}
          name: Kalendarzyk ${{ steps.changelog.outputs.tag }}
          body: ${{ steps.changelog.outputs.notes }}
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          draft: false
          prerelease: false
