name: Supabase keep-alive

# Free tier Supabase auto-pauzuje projekt po 7 dniach bez aktywności.
# Ten workflow codziennie pinguje REST endpoint, żeby reset 7-dniowy licznik.
# Job failuje gdy odpowiedź ≠ 200 — wtedy GitHub wyśle maila o failed workflow.

on:
  schedule:
    - cron: '0 6 * * *'   # codziennie 6:00 UTC (~7:00 zimą / 8:00 latem PL)
  workflow_dispatch:       # ręczny trigger z UI Actions (przycisk "Run workflow")

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase auth settings
        env:
          SUPABASE_URL: https://tkvxeozttwxxfpvmvvwp.supabase.co
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "ERROR: secret SUPABASE_ANON_KEY jest pusty — nie został dodany w Repo Settings?"
            exit 1
          fi
          echo "Key length: ${#SUPABASE_ANON_KEY}"
          echo "Key prefix: ${SUPABASE_ANON_KEY:0:10}..."
          code=$(curl -s -o /tmp/body -w '%{http_code}' \
            "$SUPABASE_URL/auth/v1/settings" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          echo "HTTP $code"
          if [ "$code" != "200" ]; then
            echo "--- response body (first 500 bytes) ---"
            head -c 500 /tmp/body || true
            echo
            echo "Unexpected status, failing job"
            exit 1
          fi
          echo "OK — Supabase active"
